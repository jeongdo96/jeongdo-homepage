<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEMO 1 — 페이드인</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      background:
        linear-gradient(rgba(20,18,16,0.28), rgba(20,18,16,0.28)),
        url('hero.jpg') center / cover no-repeat;
    }

    h1 {
      font-family: 'Gowun Batang', serif;
      font-size: clamp(17px, 2.4vw, 34px);
      font-weight: 400;
      color: #f5f0eb;
      letter-spacing: 0.12em;
      white-space: nowrap;
      opacity: 0;
      animation: fadeOnly 2s ease 0.6s forwards;
    }

    @keyframes fadeOnly {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .label {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <p class="label">DEMO 1 — 페이드인</p>
  <div class="hero">
    <h1>공간의 처음과 끝을 정도와 동행합니다.</h1>
  </div>
</body>
</html>
