<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正道 — 타이틀 위 통합</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(20,18,16,0.28), rgba(20,18,16,0.28)),
        url('hero.jpg') center / cover no-repeat;
    }

    .hero-content {
      position: relative; z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 正道 — 타이틀 위, 작은 사이즈 */
    .hanja-top {
      font-family: 'Noto Serif KR', serif;
      font-size: 42px;
      font-weight: 300;
      color: rgba(200,168,124,0.5);
      letter-spacing: 0.35em;
      margin-bottom: 20px;
      line-height: 1;
    }

    .hanja-rule {
      width: 1px;
      height: 32px;
      background: rgba(200,168,124,0.2);
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.16em;
      white-space: nowrap;
    }

    .label {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="label">03 — 正道 타이틀 위 (한자 → 라인 → 문구 수직 배치)</p>
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <span class="hanja-top">正道</span>
      <div class="hanja-rule"></div>
      <h1>공간의 처음과 끝을 정도와 동행합니다.</h1>
    </div>
  </div>
</body>
</html>
