<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2페이지 — 미세 텍스처</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow-y: auto; }

    .page {
      min-height: 100vh;
      background: #302c28;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 32px;
    }

    /* 콘크리트/석고 텍스처 CSS */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.008) 2px,
          rgba(255,255,255,0.008) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.005) 3px,
          rgba(255,255,255,0.005) 6px
        );
      opacity: 1;
    }

    /* 미세한 노이즈 그레인 */
    .page::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(138,125,107,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(138,125,107,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(100,90,75,0.05) 0%, transparent 40%);
    }

    .inner {
      max-width: 600px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .label {
      font-family: 'Pretendard', sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: rgba(220,215,207,0.3);
      margin-bottom: 56px;
    }

    .hanja {
      font-family: 'Noto Serif KR', serif;
      font-size: 52px;
      font-weight: 300;
      color: rgba(232,226,218,0.85);
      letter-spacing: 0.12em;
      margin-bottom: 14px;
    }

    .hanja-sub {
      font-family: 'Pretendard', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(220,215,207,0.35);
      margin-bottom: 64px;
    }

    .text {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(232,226,218,0.7);
      line-height: 2.1;
      letter-spacing: 0.06em;
      margin-bottom: 36px;
    }

    .accent {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(232,226,218,0.95);
      line-height: 1.7;
      letter-spacing: 0.06em;
      margin-top: 64px;
      margin-bottom: 28px;
    }

    .brand {
      font-family: 'Pretendard', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(220,215,207,0.25);
    }

    .demo-tag {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25);
      z-index: 10;
    }
  </style>
</head>
<body>
  <p class="demo-tag">02 — 미세 텍스처 (석고/콘크리트 느낌)</p>
  <div class="page">
    <div class="inner">
      <p class="label">ABOUT JEONGDO</p>
      <p class="hanja">正道</p>
      <p class="hanja-sub">바를 정(正) · 길 도(道)</p>
      <p class="text">수많은 길 중 정도는<br>인테리어라는 하나의 길을 택했습니다.</p>
      <p class="text">출발점은 언제나 정직함이며,<br>그 정직함을 보여주는 태도라고 믿습니다.</p>
      <p class="text">공간 디자인에서 중요한 것은<br>화려함이 아니라 본질과 방향성입니다.</p>
      <p class="text">철학이 있는 공간은<br>반드시 깊이 있는 공간을 만듭니다.</p>
      <p class="accent">속도보다 방향을.<br>빠름보다 바름을.</p>
      <p class="brand">DESIGN STUDIO JEONGDO</p>
    </div>
  </div>
</body>
</html>
