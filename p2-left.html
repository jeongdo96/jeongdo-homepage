<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2페이지 — 좌측 정렬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html, body { background: #ffffff; }
.page{background:#ffffff;min-height:100vh;display:flex;align-items:center;justify-content:flex-start;font-family:'Noto Serif KR',serif;padding:4rem 0 4rem 10vw}
.vgroup{display:flex;flex-direction:row;gap:5.5rem;align-items:flex-start}

.col-tag-box{display:flex;flex-direction:column;align-items:center;gap:14px;flex-shrink:0}
.tag-hanja{font-size:52px;color:#111;font-weight:200;writing-mode:vertical-lr;letter-spacing:0.22em}
.tag-kr{writing-mode:vertical-lr;font-size:13px;color:#888;letter-spacing:0.4em;margin-top:16px;font-family:'Noto Serif KR',serif;font-weight:300}

.vcol{writing-mode:vertical-lr;font-size:14px;color:#222;line-height:1;font-weight:300;letter-spacing:0.28em;flex-shrink:0;white-space:nowrap}
.vcol-main{writing-mode:vertical-lr;font-size:15px;color:#111;line-height:1;font-weight:300;letter-spacing:0.28em;flex-shrink:0;white-space:nowrap}

.pt{font-weight:500;letter-spacing:0.32em;font-size:1.15em}

/* 한자 — 아주 천천히 부드럽게 */
.col-tag-box {
  opacity: 0;
  animation: hanjaReveal 3.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
}

@keyframes hanjaReveal {
  0%   { opacity: 0; }
  30%  { opacity: 0.3; }
  60%  { opacity: 0.7; }
  100% { opacity: 1; }
}

/* 나머지 텍스트 — 한자 뒤에 부드럽게 */
.vcol, .vcol-main {
  opacity: 0;
  animation: textFade 2s cubic-bezier(0.16, 1, 0.3, 1) 3.2s forwards;
}

@keyframes textFade {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}
</style>
</head>
<body>

<div class="page">
  <div class="vgroup">

    <div class="col-tag-box">
      <div class="tag-hanja">正道</div>
      <div class="tag-kr">바를 정 · 길 도</div>
    </div>

    <div class="vcol-main">수많은 길 중 <span class="pt">정도</span>는 인테리어라는 하나의 길을 택했습니다</div>
    <div class="vcol">출발점은 언제나 <span class="pt">정직함</span>이며 그 정직함을 보여주는 태도라고 믿습니다</div>
    <div class="vcol">공간디자인에서 중요한 것은 화려함이 아니라 <span class="pt">본질과 방향성</span>입니다</div>
    <div class="vcol">철학이 있는 공간은 반드시 <span class="pt">깊이</span> 있는 공간을 만듭니다</div>
    <div class="vcol"><span class="pt">삶의 궤적</span>이 담긴 기억에 남을 공간을 만들어드립니다</div>

  </div>
</div>

</body>
</html>
