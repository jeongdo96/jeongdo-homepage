<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2페이지 시안</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.page{background:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif KR',serif;padding:3rem 2.5rem}
.vgroup{display:flex;flex-direction:row;gap:3.2rem;align-items:flex-start}

.col-tag-box{display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0}
.tag-hanja{font-size:42px;color:#111;font-weight:200;writing-mode:vertical-lr;letter-spacing:0.2em}
.tag-kr{writing-mode:vertical-lr;font-size:10px;color:#888;letter-spacing:0.4em;margin-top:14px;font-family:'Noto Serif KR',serif;font-weight:300}

.vcol{writing-mode:vertical-lr;font-size:13px;color:#333;line-height:1;font-weight:300;letter-spacing:0.28em;flex-shrink:0;white-space:nowrap}
.vcol-main{writing-mode:vertical-lr;font-size:14px;color:#111;line-height:1;font-weight:300;letter-spacing:0.28em;flex-shrink:0;white-space:nowrap}

.pt{font-weight:400;letter-spacing:0.32em}

/* 애니메이션 */
.vgroup > * {
  opacity: 0;
  transform: translateY(20px);
  animation: colFade 0.8s ease forwards;
}
.vgroup > *:nth-child(1) { animation-delay: 0.3s; }
.vgroup > *:nth-child(2) { animation-delay: 0.7s; }
.vgroup > *:nth-child(3) { animation-delay: 1.1s; }
.vgroup > *:nth-child(4) { animation-delay: 1.5s; }
.vgroup > *:nth-child(5) { animation-delay: 1.9s; }
.vgroup > *:nth-child(6) { animation-delay: 2.3s; }

@keyframes colFade {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="page">
  <div class="vgroup">

    <div class="col-tag-box">
      <div class="tag-hanja">正道</div>
      <div class="tag-kr">바를 정 · 길 도</div>
    </div>

    <div class="vcol-main">수많은 길 중 <span class="pt">정도</span>는 인테리어라는 하나의 길을 택했습니다</div>
    <div class="vcol">출발점은 언제나 <span class="pt">정직함</span>이며 그 정직함을 보여주는 태도라고 믿습니다</div>
    <div class="vcol">공간디자인에서 중요한 것은 화려함이 아니라 <span class="pt">본질과 방향성</span>입니다</div>
    <div class="vcol">철학이 있는 공간은 반드시 <span class="pt">깊이</span> 있는 공간을 만듭니다</div>
    <div class="vcol"><span class="pt">삶의 궤적</span>이 담긴 기억에 남을 공간을 만듭니다</div>

  </div>
</div>

</body>
</html>
