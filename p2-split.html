<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2페이지 — 좌우 분할</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html, body { background: #ffffff; height: 100%; }

.page {
  background: #ffffff;
  min-height: 100vh;
  display: flex;
  font-family: 'Noto Serif KR', serif;
}

/* 왼쪽 — 철학 텍스트 */
.left {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 4rem 0 4rem 8vw;
}

.vgroup {
  display: flex;
  flex-direction: row;
  gap: 5.5rem;
  align-items: flex-start;
}

.col-tag-box { display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0; }
.tag-hanja { font-size: 48px; color: #111; font-weight: 200; writing-mode: vertical-lr; letter-spacing: 0.2em; }
.tag-kr { writing-mode: vertical-lr; font-size: 11px; color: #999; letter-spacing: 0.4em; margin-top: 14px; font-weight: 300; }

.vcol { writing-mode: vertical-lr; font-size: 13px; color: #333; line-height: 1; font-weight: 300; letter-spacing: 0.26em; flex-shrink: 0; white-space: nowrap; }
.vcol-main { writing-mode: vertical-lr; font-size: 14px; color: #111; line-height: 1; font-weight: 300; letter-spacing: 0.26em; flex-shrink: 0; white-space: nowrap; }
.pt { font-weight: 500; letter-spacing: 0.3em; font-size: 1.25em; }

/* 오른쪽 — 핵심 문구 */
.right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem 6vw;
  position: relative;
}

.right-inner {
  text-align: right;
}

.accent-line {
  display: none;
}

.accent-text {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(22px, 2.8vw, 36px);
  font-weight: 300;
  color: #111;
  line-height: 1.8;
  letter-spacing: 0.08em;
}

.accent-sub {
  font-family: 'Pretendard', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: #bbb;
  margin-top: 40px;
}

/* 세로 구분선 */
.divider {
  width: 1px;
  align-self: center;
  height: 40vh;
  background: #e8e4de;
}

/* 애니메이션 */
.col-tag-box {
  opacity: 0;
  animation: slowFade 3s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
}
.vcol, .vcol-main {
  opacity: 0;
  animation: fade 1.5s ease 3s forwards;
}
.divider {
  opacity: 0;
  animation: fade 1.5s ease 3.5s forwards;
}
.accent-line {
  opacity: 0;
  transform: scaleX(0);
  transform-origin: right;
  animation: lineGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) 4s forwards;
}
.accent-text {
  opacity: 0;
  animation: fade 2s cubic-bezier(0.16, 1, 0.3, 1) 4.5s forwards;
}
.accent-sub {
  opacity: 0;
  animation: fade 1.5s ease 5.5s forwards;
}

@keyframes slowFade {
  0% { opacity: 0; }
  30% { opacity: 0.3; }
  100% { opacity: 1; }
}
@keyframes fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes lineGrow {
  from { opacity: 0; transform: scaleX(0); }
  to { opacity: 1; transform: scaleX(1); }
}
</style>
</head>
<body>

<div class="page">

  <!-- 왼쪽: 철학 -->
  <div class="left">
    <div class="vgroup">
      <div class="col-tag-box">
        <div class="tag-hanja">正道</div>
        <div class="tag-kr">바를 정 · 길 도</div>
      </div>
      <div class="vcol-main">수많은 길 중 <span class="pt">정도</span>는 인테리어라는 하나의 길을 택했습니다</div>
      <div class="vcol">출발점은 언제나 <span class="pt">정직함</span>이며 그 정직함을 보여주는 태도라고 믿습니다</div>
      <div class="vcol">공간디자인에서 중요한 것은 화려함이 아니라 <span class="pt">본질과 방향성</span>입니다</div>
      <div class="vcol">철학이 있는 공간은 반드시 <span class="pt">깊이</span> 있는 공간을 만듭니다</div>
      <div class="vcol"><span class="pt">삶의 궤적</span>이 담긴 기억에 남을 공간을 만들어드립니다</div>
    </div>
  </div>

  <!-- 구분선 -->
  <div class="divider"></div>

  <!-- 오른쪽: 핵심 문구 -->
  <div class="right">
    <div class="right-inner">
      <div class="accent-line"></div>
      <p class="accent-text">
        속도보다 방향을.<br>
        빠름보다 바름을.
      </p>
      <p class="accent-sub">DESIGN STUDIO JEONGDO</p>
    </div>
  </div>

</div>

</body>
</html>
