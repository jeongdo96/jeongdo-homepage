<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse 3 — 패럴랙스</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
    }

    .hero-bg {
      position: absolute; inset: -20px;
      background:
        linear-gradient(rgba(20,18,16,0.28), rgba(20,18,16,0.28)),
        url('hero.jpg') center / cover no-repeat;
      transition: transform 0.15s ease-out;
    }

    h1 {
      position: relative; z-index: 2;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.16em;
      white-space: nowrap;
      transition: transform 0.15s ease-out;
    }

    .label {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="label">03 — 패럴랙스 (배경과 텍스트가 반대로 움직임)</p>
  <div class="hero">
    <div class="hero-bg" id="bg"></div>
    <h1 id="title">공간의 처음과 끝을 정도와 동행합니다.</h1>
  </div>

  <script>
    const bg = document.getElementById('bg');
    const title = document.getElementById('title');
    document.addEventListener('mousemove', e => {
      const cx = (e.clientX / window.innerWidth - 0.5) * 2;
      const cy = (e.clientY / window.innerHeight - 0.5) * 2;
      bg.style.transform = `translate(${cx * -8}px, ${cy * -8}px)`;
      title.style.transform = `translate(${cx * 4}px, ${cy * 4}px)`;
    });
  </script>
</body>
</html>
