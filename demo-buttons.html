<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버튼 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #faf8f5; padding: 60px; }
    :root { --text-dark: #2b2824; --text-mid: #6b6158; --text-muted: #a69e95; --brown: #8a7d6b; }

    h2 { font-size: 12px; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 20px; }
    .section { margin-bottom: 60px; padding: 40px; background: #f2efea; max-width: 320px; display:flex; flex-direction:column; gap: 20px; min-height: 200px; justify-content: flex-end; }

    /* 1. 미니멀 테두리 버튼 */
    .btn1 {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 24px;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; letter-spacing: 3px; color: var(--text-mid);
      border: 1px solid rgba(0,0,0,0.12); background: none; cursor: pointer;
      transition: all 0.3s;
    }
    .btn1:hover { color: var(--text-dark); border-color: rgba(0,0,0,0.3); }
    .btn1 svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    /* 2. 다크 필 버튼 */
    .btn2 {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; letter-spacing: 3px; color: #f2efea;
      background: var(--text-dark); border: none; cursor: pointer;
      transition: all 0.3s;
    }
    .btn2:hover { background: var(--brown); }
    .btn2 svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    /* 3. 밑줄 텍스트 + 화살표 */
    .btn3 {
      display: inline-flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer;
      font-family: 'Pretendard', sans-serif;
      font-size: 12px; letter-spacing: 1px; color: var(--text-dark);
      padding: 0; position: relative;
    }
    .btn3::after {
      content: ''; position: absolute; bottom: -3px; left: 22px; right: 0;
      height: 1px; background: var(--text-dark);
      transform: scaleX(0.4); transform-origin: left;
      transition: transform 0.3s;
    }
    .btn3:hover::after { transform: scaleX(1); }
    .btn3 svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    /* 4. 큰 화살표 아이콘 + hover 텍스트 */
    .btn4 {
      display: inline-flex; align-items: center; gap: 0;
      background: none; border: none; cursor: pointer;
      padding: 8px; color: var(--text-muted);
      transition: color 0.3s;
    }
    .btn4:hover { color: var(--text-dark); }
    .btn4 svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.2; }
    .btn4 span {
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; letter-spacing: 2px;
      max-width: 0; overflow: hidden; opacity: 0;
      transition: max-width 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
      white-space: nowrap;
    }
    .btn4:hover span { max-width: 200px; opacity: 1; margin-left: 8px; }
  </style>
</head>
<body>

  <div class="section">
    <h2>1. 미니멀 테두리</h2>
    <button class="btn1">
      <svg viewBox="0 0 14 14"><polyline points="9,2 3,7 9,12"/></svg>
      목록으로
    </button>
  </div>

  <div class="section">
    <h2>2. 다크 버튼</h2>
    <button class="btn2">
      <svg viewBox="0 0 14 14"><polyline points="9,2 3,7 9,12"/></svg>
      목록으로
    </button>
  </div>

  <div class="section">
    <h2>3. 밑줄 확장</h2>
    <button class="btn3">
      <svg viewBox="0 0 14 14"><polyline points="9,2 3,7 9,12"/></svg>
      목록으로
    </button>
  </div>

  <div class="section">
    <h2>4. 아이콘 → hover 시 텍스트</h2>
    <button class="btn4">
      <svg viewBox="0 0 14 14"><polyline points="9,2 3,7 9,12"/></svg>
      <span>목록으로</span>
    </button>
  </div>

</body>
</html>
