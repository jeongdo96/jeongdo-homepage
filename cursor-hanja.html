<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正道 커서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: none; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(20,18,16,0.28), rgba(20,18,16,0.28)),
        url('hero.jpg') center / cover no-repeat;
    }

    h1 {
      position: relative; z-index: 2;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.16em;
      white-space: nowrap;
    }

    /* 작은 커서 점 */
    #dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(220,215,207,0.7);
      pointer-events: none;
      z-index: 200;
      transform: translate(-50%, -50%);
    }

    /* 正道 텍스트 커서 */
    #hanja-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 199;
      font-family: 'Noto Serif KR', serif;
      font-size: 48px;
      font-weight: 300;
      color: rgba(200,168,124,0.12);
      letter-spacing: 0.1em;
      transform: translate(-50%, -50%);
      transition: left 0.25s cubic-bezier(0.23, 1, 0.32, 1),
                  top 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      user-select: none;
      white-space: nowrap;
    }

    .label {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); z-index: 200;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="label">正道 — 마우스를 따라다니는 한자</p>
  <div id="dot"></div>
  <div id="hanja-cursor">正道</div>
  <div class="hero">
    <div class="hero-bg"></div>
    <h1>공간의 처음과 끝을 정도와 동행합니다.</h1>
  </div>

  <script>
    const dot = document.getElementById('dot');
    const hanja = document.getElementById('hanja-cursor');

    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
      hanja.style.left = e.clientX + 'px';
      hanja.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
