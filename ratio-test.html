<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비율 비교</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    .split {
      display: flex; width: 100%; height: 100%;
    }

    .panel {
      flex: 1;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .panel:first-child { border-right: 1px solid rgba(0,0,0,0.1); }

    /* 왼쪽: cover (비율 유지, 크롭) */
    .panel-cover .bg {
      position: absolute; inset: 0;
      background: url('hero.jpg') center 55% / cover no-repeat;
    }

    /* 오른쪽: 100% 100% (비율 무시, 풀 채움) */
    .panel-stretch .bg {
      position: absolute; inset: 0;
      background: url('hero.jpg') center / 100% 100% no-repeat;
    }

    .label {
      position: absolute; top: 20px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(43,40,36,0.5);
      background: rgba(255,255,255,0.7);
      padding: 6px 14px;
      white-space: nowrap;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="split">
    <div class="panel panel-cover">
      <div class="bg"></div>
      <span class="label">COVER — 비율 유지, 크롭</span>
    </div>
    <div class="panel panel-stretch">
      <div class="bg"></div>
      <span class="label">100% — 비율 무시, 풀 채움</span>
    </div>
  </div>
</body>
</html>
