<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커서 C — 미니멀 변형</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: none; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
      background:
        linear-gradient(rgba(255,255,250,0.15), rgba(255,255,250,0.1)),
        url('hero-wide.jpg') center / cover no-repeat;
    }

    .content { position: relative; z-index: 2; text-align: center; }

    .logo {
      font-family: 'Pretendard', sans-serif;
      font-size: 17px; font-weight: 500;
      letter-spacing: 0.45em; color: #5c4a3a;
      position: absolute; top: 32px; left: 50%;
      transform: translateX(-50%); z-index: 3;
    }

    h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400; color: #5c4a3a;
      letter-spacing: 0.16em; white-space: nowrap;
    }

    .btn {
      margin-top: 48px;
      font-family: 'Noto Serif KR', serif;
      font-size: 17px; font-weight: 400;
      letter-spacing: 0.2em; color: #8a7560;
      background: none; border: none; cursor: none;
      padding: 8px 0;
    }

    /* 커서 */
    #dot {
      position: fixed; width: 6px; height: 6px;
      border-radius: 50%; background: rgba(92,74,58,0.75);
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, background 0.3s, border-radius 0.3s;
    }
    #ring {
      position: fixed; width: 32px; height: 32px;
      border: 1.5px solid rgba(92,74,58,0.25);
      border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.13s ease-out, top 0.13s ease-out,
                  width 0.35s, height 0.35s, border-radius 0.35s,
                  border-color 0.3s, transform 0.35s;
    }

    /* 호버 상태: 원 → 다이아몬드 */
    #dot.hover { width: 4px; height: 4px; background: rgba(92,74,58,0.9); }
    #ring.hover {
      width: 24px; height: 24px;
      border-radius: 3px;
      border-color: rgba(92,74,58,0.45);
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .tag {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif; font-size: 10px;
      letter-spacing: 0.15em; color: rgba(92,74,58,0.3);
    }
  </style>
</head>
<body>
  <p class="logo">J E O N G D O</p>
  <div id="dot"></div>
  <div id="ring"></div>
  <div class="hero">
    <div class="content">
      <h1 class="hoverable">공간의 처음과 끝을 정도와 동행합니다.</h1>
      <p class="btn hoverable">알아보기</p>
    </div>
  </div>
  <p class="tag">글씨 위에 마우스를 올려보세요 — 원 → 다이아몬드 변형</p>

  <script>
    const dot = document.getElementById('dot');
    const ring = document.getElementById('ring');

    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
      ring.style.left = e.clientX + 'px';
      ring.style.top = e.clientY + 'px';
    });

    document.querySelectorAll('.hoverable').forEach(el => {
      el.addEventListener('mouseenter', () => {
        dot.classList.add('hover');
        ring.classList.add('hover');
      });
      el.addEventListener('mouseleave', () => {
        dot.classList.remove('hover');
        ring.classList.remove('hover');
      });
    });
  </script>
</body>
</html>
