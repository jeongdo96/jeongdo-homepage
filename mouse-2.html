<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse 2 — 스포트라이트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: none; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(20,18,16,0.35), rgba(20,18,16,0.35)),
        url('hero.jpg') center / cover no-repeat;
    }

    #spotlight {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: opacity 0.3s;
    }

    /* 작은 커서 점 */
    #cursor-dot {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
    }

    h1 {
      position: relative; z-index: 2;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.16em;
      white-space: nowrap;
    }

    .label {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="label">02 — 스포트라이트 (마우스 주변이 밝아짐)</p>
  <div id="spotlight"></div>
  <div id="cursor-dot"></div>
  <div class="hero">
    <div class="hero-bg"></div>
    <h1>공간의 처음과 끝을 정도와 동행합니다.</h1>
  </div>

  <script>
    const spot = document.getElementById('spotlight');
    const dot = document.getElementById('cursor-dot');
    document.addEventListener('mousemove', e => {
      spot.style.left = e.clientX + 'px';
      spot.style.top = e.clientY + 'px';
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
