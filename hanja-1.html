<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正道 — 워터마크</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(20,18,16,0.28), rgba(20,18,16,0.28)),
        url('hero.jpg') center / cover no-repeat;
    }

    /* 正道 — 큰 워터마크 */
    .hanja-watermark {
      position: absolute;
      z-index: 1;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(180px, 28vw, 380px);
      font-weight: 900;
      color: rgba(255,255,255,0.04);
      letter-spacing: -0.05em;
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    h1 {
      position: relative; z-index: 2;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.16em;
      white-space: nowrap;
    }

    .label {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="label">01 — 正道 대형 워터마크 (배경에 은은하게)</p>
  <div class="hero">
    <div class="hero-bg"></div>
    <span class="hanja-watermark">正道</span>
    <h1>공간의 처음과 끝을 정도와 동행합니다.</h1>
  </div>
</body>
</html>
