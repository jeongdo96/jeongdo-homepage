<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse 4 — 커서 트레일</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: none; }

    .hero {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 10vh;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(20,18,16,0.28), rgba(20,18,16,0.28)),
        url('hero.jpg') center / cover no-repeat;
    }

    #cursor-main {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(220,215,207,0.8);
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
    }

    #cursor-trail {
      position: fixed;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(220,215,207,0.25);
      pointer-events: none;
      z-index: 99;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease-out, top 0.12s ease-out, width 0.3s, height 0.3s, border-color 0.3s;
    }

    h1 {
      position: relative; z-index: 2;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14.4px, 1.92vw, 28.8px);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.16em;
      white-space: nowrap;
    }

    .label {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); z-index: 100;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="label">04 — 커서 트레일 (부드럽게 따라오는 원)</p>
  <div id="cursor-main"></div>
  <div id="cursor-trail"></div>
  <div class="hero">
    <div class="hero-bg"></div>
    <h1>공간의 처음과 끝을 정도와 동행합니다.</h1>
  </div>

  <script>
    const main = document.getElementById('cursor-main');
    const trail = document.getElementById('cursor-trail');

    document.addEventListener('mousemove', e => {
      main.style.left = e.clientX + 'px';
      main.style.top = e.clientY + 'px';
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
