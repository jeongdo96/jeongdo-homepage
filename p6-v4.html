<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>완료 — V4 카운트업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'Noto Serif KR',serif}
.page{width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px}

.count-wrap{margin-bottom:40px;text-align:center}
.count-num{
  font-family:'Pretendard',sans-serif;
  font-size:72px;font-weight:100;color:#8a7560;
  letter-spacing:-0.02em;line-height:1;
  margin-bottom:8px;
}
.count-pct{
  font-family:'Pretendard',sans-serif;
  font-size:14px;font-weight:300;color:#bbb;letter-spacing:0.15em;
}

.done-title{font-size:24px;font-weight:300;color:#2b2824;letter-spacing:0.04em;margin-bottom:10px}
.done-sub{font-size:13px;font-weight:300;color:#999;line-height:1.8;text-align:center;margin-bottom:56px}
.label{font-family:'Pretendard',sans-serif;font-size:10px;letter-spacing:0.35em;color:#bbb;margin-bottom:28px}

.links{display:flex;gap:32px}
.link-item{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;opacity:0.4;transition:opacity 0.3s;
}
.link-item:hover{opacity:1}
.link-circle{
  width:52px;height:52px;border-radius:50%;
  border:1px solid #e0dbd5;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.3s,background 0.3s;
}
.link-item:hover .link-circle{border-color:#8a7560;background:rgba(138,117,96,0.04)}
.link-circle span{font-family:'Pretendard',sans-serif;font-size:9px;font-weight:500;color:#8a7560;letter-spacing:0.05em}
.link-label{font-family:'Pretendard',sans-serif;font-size:10px;color:#999;letter-spacing:0.1em}

.tag{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:sans-serif;font-size:10px;letter-spacing:0.2em;color:#ccc}
</style>
</head>
<body>
<p class="tag">V4 — 카운트업 + 아이콘 링크</p>
<div class="page">
  <div class="count-wrap">
    <div class="count-num" id="countNum">0</div>
    <div class="count-pct">COMPLETE</div>
  </div>
  <h2 class="done-title">신청이 완료되었습니다</h2>
  <p class="done-sub">정도가 소중한 연락을 확인 후<br>빠르게 연락드리겠습니다.</p>
  <p class="label">정도를 더 알아보기</p>
  <div class="links">
    <a class="link-item" href="https://www.instagram.com" target="_blank">
      <div class="link-circle"><span>IG</span></div>
      <span class="link-label">Instagram</span>
    </a>
    <a class="link-item" href="https://www.youtube.com" target="_blank" style="text-decoration:none">
      <div class="link-circle"><span>YT</span></div>
      <span class="link-label">YouTube</span>
    </a>
    <a class="link-item" href="https://blog.naver.com" target="_blank" style="text-decoration:none">
      <div class="link-circle"><span>BG</span></div>
      <span class="link-label">Blog</span>
    </a>
  </div>
</div>
<script>
// 카운트업 0 → 100
var el = document.getElementById('countNum');
var n = 0;
var timer = setInterval(function(){
  n += 2;
  if(n > 100){ n=100; clearInterval(timer); }
  el.textContent = n;
}, 25);
</script>
</body>
</html>
